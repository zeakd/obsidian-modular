# Path C release — currently MANUAL TRIGGER ONLY.
#
# Why workflow_dispatch only (no tag-push trigger): modular currently consumes
# obsidian-plugin-kit + obsidian-sim via `link:../kit/...` so CI has no way to
# install them (the kit repo isn't a sibling on a GitHub runner). Until kit
# is published to npm and these deps switch to npm version specifiers, this
# workflow won't succeed on its own.
#
# Local release flow today:
#   pnpm exec opk release patch          # bumps version, builds, commits, tags, push --follow-tags
#   <copy the printed `gh release create ...` line and run it locally>
#
# When kit is published:
#   1. swap `link:` to `^x.y.z` in package.json
#   2. uncomment the tag-push trigger below
#   3. delete the workflow_dispatch line (or keep it for manual re-runs)

name: Release

on:
  workflow_dispatch:
  # push:
  #   tags:
  #     - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/main.js dist/manifest.json dist/styles.css \
            --title "$GITHUB_REF_NAME" --draft \
            --notes "Release $GITHUB_REF_NAME"
